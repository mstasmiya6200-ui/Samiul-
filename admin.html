<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অ্যাডমিন - বাগবাড়ি শহীদ জিয়া ডিগ্রী কলেজ</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }
        header {
            background: #004080;
            color: white;
            padding: 20px;
            text-align: center;
        }
        nav {
            background: #333;
            overflow: hidden;
        }
        nav a {
            float: left;
            display: block;
            color: white;
            text-align: center;
            padding: 14px 20px;
            text-decoration: none;
        }
        nav a:hover {
            background: #ddd;
            color: black;
        }
        section {
            padding: 30px;
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            margin-bottom: 60px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        footer {
            background: #004080;
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
        h2 {
            color: #004080;
            text-align: center;
        }
        .admin-form {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        input, textarea, button {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
        }
        button {
            background: #004080;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background: #ff6600;
        }
    </style>
</head>
<body>

    <header>
        <h1>শহীদ জিয়া ডিগ্রী কলেজ</h1>
        <p>অ্যাডমিন প্যানেল</p>
    </header>

    <nav>
        <a href="index.html">হোম</a>
        <a href="result.html">রেজাল্ট</a>
        <a href="teachers.html">শিক্ষক</a>
        <a href="about.html">সম্পর্কে</a>
        <a href="admin.html">অ্যাডমিন</a>
    </nav>

    <section>
        <h2>অ্যাডমিন প্যানেল</h2>
        <div class="admin-form">
            <h3>রেজাল্ট যোগ করুন</h3>
            <form>
                <input type="number" id="serial" placeholder="সিরিয়াল নম্বর" required>
                <input type="number" id="roll" placeholder="রোল নম্বর" required>
                <input type="text" id="name" placeholder="শিক্ষার্থীর নাম" required>
                <input type="text" id="subject" placeholder="সাবজেক্ট" required>
                <input type="number" id="gpa" placeholder="জিপিএ" step="0.01" required>
                <button type="button" onclick="addResult()">যোগ করুন</button>
            </form>
        </div>
    </section>

    <footer>
        <p>&copy; 2025 শহীদ জিয়া ডিগ্রী কলেজ</p>
    </footer>

    <script>
        async function addResult() {
            const serial = document.getElementById('serial').value;
            const roll = document.getElementById('roll').value;
            const name = document.getElementById('name').value;
            const subject = document.getElementById('subject').value;
            const gpa = document.getElementById('gpa').value;

            if (!serial || !roll || !name || !subject || !gpa) {
                alert('সব ফিল্ড পূরণ করুন');
                return;
            }

            try {
                const response = await fetch('/.netlify/functions/addResult', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ serial, roll, name, subject, gpa })
                });

                const data = await response.json();
                if (data.success) {
                    alert('রেজাল্ট যোগ হয়েছে!');
                    document.querySelector('form').reset();
                } else {
                    alert('ত্রুটি: ' + data.error);
                }
            } catch (error) {
                alert('সার্ভার সমস্যা: ' + error.message);
            }
        }
    </script>
</body>
</html>
