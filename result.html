<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>রেজাল্ট - বাগবাড়ি শহীদ জিয়া ডিগ্রী কলেজ</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }
        header {
            background: #004080;
            color: white;
            padding: 20px;
            text-align: center;
        }
        nav {
            background: #333;
            overflow: hidden;
        }
        nav a {
            float: left;
            display: block;
            color: white;
            text-align: center;
            padding: 14px 20px;
            text-decoration: none;
        }
        nav a:hover {
            background: #ddd;
            color: black;
        }
        section {
            padding: 30px;
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            margin-bottom: 60px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        footer {
            background: #004080;
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .results-table thead {
            background: #004080;
            color: white;
        }
        .results-table th,
        .results-table td {
            padding: 12px;
            text-align: center;
            border: 1px solid #ddd;
        }
        .results-table tbody tr:nth-child(even) {
            background: #f9f9f9;
        }
        .results-table tbody tr:hover {
            background: #e8f4f8;
        }
        h2 {
            color: #004080;
            text-align: center;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
    </style>
</head>
<body>

    <header>

    <nav>

        <a href="teachers.html">শিক্ষক</a>
        <a href="about.html">সম্পর্কে</a>
        <a href="admin.html">অ্যাডমিন</a>
    </nav>

    <section>
        <h2>শিক্ষার্থীর রেজাল্ট</h2>
        <div id="results-list" class="loading">রেজাল্ট লোড হচ্ছে...</div>
    </section>

    <footer>
        <p>&copy; 2025 শহীদ জিয়া ডিগ্রী কলেজ</p>
