<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>রেজাল্ট দেখুন - বাগবাড়ী শহীদ জিয়া ডিগ্রী কলেজ</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .result-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            text-align: center;
            background-color: #f9f9f9;
        }

        /* আপনার ইনপুট বক্সের নতুন এবং স্পষ্ট সিএসএস কোড */
        input {
            width: 80%;
            padding: 12px;
            margin-bottom: 10px;
            border: 2px solid #28a745; 
            border-radius: 5px;
            font-size: 18px; 
            color: #000000 !important; /* টাইপ করার সময় লেখা একদম গাঢ় কালো দেখাবে */
            background-color: #ffffff !important; /* বক্সের ভেতরটা সবসময় সাদা থাকবে */
        }

        /* রোল নম্বর লেখার আগে ভেতরের হালকা লেখাটি স্পষ্ট করার জন্য */
        input::placeholder {
            color: #555555 !important;
            opacity: 1 !important;
        }

        button {
            padding: 10px 20px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        #displayBox {
            margin-top: 20px;
            padding: 15px;
            border-top: 2px solid #28a745;
            display: none; 
        }
    </style>
</head>
<body>

    <div class="result-container">
        <h2>ছাত্র-ছাত্রীর রেজাল্ট খুঁজুন</h2>
        <input type="number" id="rollInput" placeholder="রোল নম্বর দিন">
        <br>
        <button onclick="searchResult()">ফলাफल দেখুন</button>

        <div id="displayBox">
            <h3 id="studentName" style="color: #333;"></h3>
            <p id="studentGPA" style="font-weight: bold; color: #000;"></p>
            <p id="studentStatus" style="color: #000;"></p>
        </div>
    </div>

    <script>
    async function searchResult() {
        const roll = document.getElementById('rollInput').value;
        const displayBox = document.getElementById('displayBox');
        
        if(!roll) {
            alert("অনুগ্রহ করে একটি রোল নম্বর দিন!");
            return;
        }

        document.getElementById('studentName').innerText = "খোঁজা হচ্ছে...";
        displayBox.style.display = 'block';

        try {
            const response = await fetch(`/.netlify/functions/get-result?roll=${roll}`);
            const data = await response.json();

            if (data.error) {
                alert("দুঃখিত: " + data.error);
                displayBox.style.display = 'none';
            } else {
                document.getElementById('studentName').innerText = "নাম: " + data.name;
                document.getElementById('studentGPA').innerText = "জিপিএ: " + data.gpa;
                document.getElementById('studentStatus').innerText = "অবস্থা: " + data.status;
                displayBox.style.display = 'block';
            }
        } catch (err) {
            console.error(err);
            alert("সার্ভারে সমস্যা হচ্ছে, পরে চেষ্টা করুন।");
        }
    }
    </script>
</body>
</html>
